# NEO Orchestrator Configuration
# ================================
# Environment variables take precedence over these defaults.
# Variable names match the keys below (e.g., NEO_API_BASE_URL).

# === API Settings ===
NEO_API_BASE_URL=http://localhost:8000
NEO_API_TIMEOUT_MS=30000
NEO_API_MAX_RETRIES=3
NEO_API_AUTH_TOKEN=

# === Risk Management ===
NEO_CONFIDENCE_THRESHOLD=0.7
NEO_MAX_VOLATILITY=2.0
NEO_MAX_POSITION_SIZE=0.1
NEO_MAX_DRAWDOWN_PCT=0.05
NEO_DAILY_LOSS_LIMIT=500.0

# === Autonomous Loop ===
NEO_LOOP_INTERVAL_MS=60000
NEO_TRADING_SYMBOL=BTC/USD

# === PostgreSQL Database ===
NEO_DB_URL=jdbc:postgresql://localhost:5432/neoai_db
NEO_DB_USER=neoai
NEO_DB_PASSWORD=
NEO_DB_POOL_SIZE=5

# === Redis Cache ===
NEO_REDIS_HOST=localhost
NEO_REDIS_PORT=6379
NEO_REDIS_PASSWORD=
NEO_REDIS_TTL_SECONDS=300

# === Dashboard ===
NEO_DASHBOARD_PORT=9090
