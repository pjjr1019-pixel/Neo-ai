# Prometheus configuration for NEO Hybrid AI System
# Scrape configuration for all NEO services.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # NEO AI Python Service
  - job_name: "neo-ai-service"
    metrics_path: "/metrics/prometheus"
    static_configs:
      - targets: ["neo-ai-service:8000"]
        labels:
          service: "neo-ai"
          environment: "development"

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
